services:
  landing:
    build: .
    container_name: campstore-landing
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:${PORT:-3001}:${PORT:-3001}"
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
